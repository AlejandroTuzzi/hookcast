server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hookcast.studio www.hookcast.studio;

    ssl_certificate /etc/letsencrypt/live/hookcast.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hookcast.studio/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location ^~ /media/ {
        alias /srv/hookcast/media/;
        autoindex off;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET HEAD { deny all; }
    }

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name hookcast.studio www.hookcast.studio;
    return 301 https://$host$request_uri;
}
